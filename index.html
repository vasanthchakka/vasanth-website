<!DOCTYPE html>
<html>
<head>
<title>Project Dashboard</title>

<link rel="stylesheet" href="styles.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="dashboard">

<div class="card big">
<h1>13</h1>
<p>Days since incident</p>
</div>

<div class="card">
<h2>29</h2>
<p>Incidents this year</p>
</div>

<div class="card">
<h2>94%</h2>
<p>Training completion</p>
</div>

<div class="card">
<h2>24</h2>
<p>Risk assessments pending</p>
</div>

<div class="card chart">
<canvas id="incidentChart"></canvas>
</div>

<div class="card chart">
<canvas id="evacuationChart"></canvas>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
