<!DOCTYPE html>
<html>
<head>
    <title>Project Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="sidebar">
    <h2>Project Dashboard</h2>
    <ul>
        <li onclick="showSection('home')">Home</li>
        <li onclick="showSection('projects')">Projects</li>
        <li onclick="showSection('analytics')">Analytics</li>
        <li onclick="showSection('settings')">Settings</li>
    </ul>
</div>

<div class="main">

    <div id="home" class="section">
        <h1>Welcome</h1>
        <p>This is your project dashboard.</p>
    </div>

    <div id="projects" class="section" style="display:none">
        <h1>Projects</h1>
        <div class="card">Smart Traffic System</div>
        <div class="card">IoT Concrete Monitoring</div>
        <div class="card">Structural Health Monitoring</div>
    </div>

    <div id="analytics" class="section" style="display:none">
        <h1>Analytics</h1>
        <p>Project statistics will appear here.</p>
    </div>

    <div id="settings" class="section" style="display:none">
        <h1>Settings</h1>
        <p>Dashboard settings panel.</p>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
